[package]
name = "bcftools"
kind = "tool"
version = "1.23.1"
release = 1
license = "GPL-3.0"
main = "src/main.taf"

[meta]
domain = "bio"
categories = ["genomics", "variant-calling", "vcf-bcf"]
keywords = ["vcf", "bcf", "variant", "genotype", "annotation", "htslib", "bgzip", "tabix"]
description = "Toolkit for variant calling and manipulating VCF/BCF genomic variant files."

[repository]
url = "https://github.com/taffish/bcftools"

[command]
name = "taf-bcftools"

[runtime]
pipe = true
command_mode = true

[container]
image = "ghcr.io/taffish/bcftools:1.23.1-r1"
dockerfile = "docker/Dockerfile"
build_platforms = "linux/amd64,linux/arm64"

[upstream]
type = "github"
repo = "samtools/bcftools"
license = "MIT/Expat or GPL"
citation = "Danecek et al. 2021"
doi = "10.1093/gigascience/giab008"
pmid = "33590861"
watch = "tags"

[smoke]
backend = "docker"
timeout = 60
exist = ["bcftools", "bgzip", "tabix", "plot-vcfstats", "python", "perl"]
test = ["bcftools --help", "bcftools --version 2>&1 | grep -F 'bcftools 1.23.1' >/dev/null", "bcftools polysomy -h 2>&1 | grep -F 'bcftools polysomy' >/dev/null", "bcftools cnv -h 2>&1 | grep -F 'bcftools cnv' >/dev/null", "bcftools plugin -l >/dev/null", "plot-vcfstats -h >/dev/null", "python -c 'import gffutils, matplotlib, numpy'", "bgzip --help >/dev/null", "tabix --help >/dev/null"]
